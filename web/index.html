<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGV Web 3D Viz</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入本地的 Three.js 及依赖库，支持纯内网断网运行 -->
    <script src="libs/three.min.js"></script>
    <script src="libs/OrbitControls.js"></script>
    <script src="libs/PCDLoader.js"></script>
</head>
<body>
    <!-- 左侧控制面板 -->
    <div id="control-panel">
        <!-- 新增：带折叠按钮的标题栏 -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 10px;">
            <h3 style="margin: 0; border: none; padding: 0;">面板控制</h3>
            <button id="btn-toggle-panel" style="background: transparent; border: 1px solid #777; font-size: 14px; padding: 2px 6px;">折叠 -</button>
        </div>

        <!-- 新增：把之前的内容包裹在这个 div 里 -->
        <div id="panel-content">
            <h3>网关状态</h3>
            <div id="status">未连接</div>

            <!-- 【全新增加】：地图选择器 -->
            <h3>地图选择</h3>
            <div style="margin-bottom: 15px; display: flex; gap: 5px;">
                <select id="map-select" style="flex: 1; padding: 3px;">
                    <option value="">等待获取地图列表...</option>
                </select>
                <button id="btn-load-map" style="padding: 3px 8px; cursor: pointer;">加载地图</button>
            </div>
            <!-- 【新增】：强制更新缓存的复选框 -->
            <div style="font-size: 12px; color: #ffaa00; margin-bottom: 15px;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="cb-force-update"> ⚠️ 强制重新下载最新地图 (忽略缓存)
                </label>
            </div>

            <h3>数据流控制</h3>
            <div class="control-row">点云 (Point Cloud) <button id="btn-point_cloud">Stop</button></div>
            <div class="control-row">位置 (AGV Position) <button id="btn-agv_position">Stop</button></div>
            <!--在下方插入视角跟随复选框 -->
            <div style="padding-left: 10px; margin-bottom: 10px; font-size: 13px; color: #00aaff;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="cb-follow" checked> 🎥 视角跟随小车
                </label>
            </div>
            <div class="control-row">避障轮廓 (Obst Polygon) <button id="btn-obst_polygon">Stop</button></div>
            <div class="control-row">模型轮廓 (Model Polygon) <button id="btn-model_polygon">Stop</button></div>
            <div class="control-row">避障点云 (Scan2Pcl) <button id="btn-scan2pointcloud">Stop</button></div>
            <div class="control-row">障碍物点云 (Obst Pcl) <button id="btn-obst_pcl">Stop</button></div>
            <!-- 扫码相机数据按钮 -->
            <div class="control-row">扫码相机 (QR Camera) <button id="btn-qr_camera_data">Start</button></div>

            <h3>测试接口</h3>
            <button id="btn-get_log">获取日志列表 (get_log_list)</button>
            <textarea id="log-output" readonly placeholder="日志列表将显示在这里..."></textarea>
        </div>
    </div>

    <!-- 右下角的颜色图例面板 -->
    <div id="legend-panel">
        <h4>图例 (Legend)</h4>
        <div class="legend-item">
            <span class="color-box" style="background: #aaaaaa;"></span> 全局点云 (Global Map)
        </div>
        <div class="legend-item">
            <span class="color-box" style="background: #ff0000;"></span> 避障点云 (Scan2Pcl)
        </div>
        <div class="legend-item">
            <span class="color-box" style="background: #ffaa00;"></span> 障碍物点云 (Obst Pcl)
        </div>
        <div class="legend-item">
            <span class="line-box" style="border-bottom: 2px solid #00aaff;"></span> 模型轮廓 (车体)
        </div>
        <div class="legend-item">
            <span class="line-box" style="border-bottom: 2px solid #ff00ff;"></span> 避障轮廓 (安全区)
        </div>
    </div>

    <!-- 核心逻辑 -->
    <script src="app.js"></script>
</body>
</html>
